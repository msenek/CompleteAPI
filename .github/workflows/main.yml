name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore TestAPI/TestAPI.sln

    - name: Build
      run: dotnet build TestAPI/TestAPI.sln --no-restore

    - name: Test
      run: dotnet test TestAPI/TestAPI.sln --no-build
